# Enhanced colors
set -g default-terminal 'tmux-256color'

# Use of mouse
set -g mouse on

# Status Bar Position
set-option -g status-position top

# Start windows and panes at #1 instead of #0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Customize catppuccin UX design
set -g @catppuccin_session_icon "󰍹 "   # nerd font icon
set -g @catppuccin_host_icon "󰒋 "
set -g @catppuccin_application_icon "󰀻 "
set -g @catppuccin_battery_icon "󰁹 "
set -g @catppuccin_date_time_icon "󰥔 "
# Colors
set -g @catppuccin_session_color "#9737CE"
set -g @catppuccin_host_color "#A06EBF"
set -g @catppuccin_application_color "#055477"
set -g @catppuccin_battery_color "#639654"
set -g @catppuccin_date_time_color "#A06EBF"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Customize Status Bar
set -g status-left "" 
set -ag status-left "#{E:@catppuccin_status_session}"
set -g @catppuccin_status_background "none"

set -g status-right "#{E:@catppuccin_status_host}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -agF status-right "#{E:@catppuccin_status_ram}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
